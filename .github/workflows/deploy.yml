name: Build & Deploy

on:
  push:
    branches: [main, master]
  # 允许手动触发
  workflow_dispatch:

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME || 'ghcr.io/${{ github.repository_owner }}' }}/paicli
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloud Server
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 设置 Java 环境（用于编译验证，可选）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # 3. 编译验证（确保代码能通过编译）
      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      # 4. 登录容器仓库
      # 支持两种方式：
      #   - Docker Hub: 设置 DOCKER_USERNAME + DOCKER_PASSWORD
      #   - GitHub Container Registry: 自动用 GITHUB_TOKEN
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: ${{ secrets.DOCKER_USERNAME != '' }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ secrets.DOCKER_USERNAME == '' }}

      # 5. 构建并推送 Docker 镜像
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest

      # 6. 部署到云服务器
      - name: Deploy to Cloud Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e

            # 进入部署目录
            cd /opt/paicli

            # 拉取最新镜像
            docker compose pull paicli

            # 重启服务（restart: always 会自动拉起崩溃的进程）
            docker compose up -d paicli

            # 清理旧镜像
            docker image prune -f

            # 检查服务状态
            echo "=== 部署完成 ==="
            docker compose ps
            echo "---"
            echo "Runtime API: http://$(curl -s ifconfig.me):8080"
            echo "日志查看: docker compose logs -f paicli"
