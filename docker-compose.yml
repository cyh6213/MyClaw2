services:
  # ============================================
  # MyClaw - AI 角色扮演伴侣
  # ============================================
  paicli:
    build: ./repo
    image: myclaw:latest
    container_name: myclaw
    restart: always          # 崩溃自动拉起
    ports:
      - "8080:8080"          # Runtime API
    environment:
      # --- LLM API Keys（按需启用）---
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - SILICONFLOW_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V4-Flash}
      - GLM_API_KEY=${GLM_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - STEP_API_KEY=${STEP_API_KEY:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      # --- 默认模型 ---
      - PAICLI_DEFAULT_PROVIDER=${PAICLI_DEFAULT_PROVIDER:-siliconflow}
      # --- Hindsight 记忆服务 ---
      - HINDSIGHT_URL=http://hindsight:8888
      - HINDSIGHT_BANK_ID=${HINDSIGHT_BANK_ID:-claw}
      # --- Runtime API 认证 ---
      - PAICLI_RUNTIME_API_KEY=${PAICLI_RUNTIME_API_KEY:-changeme}
      # --- 其他配置 ---
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据（记忆、配置、快照、任务等）
      - paicli_data:/root/.paicli
      # 挂载项目目录让 MyClaw 操作
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    working_dir: /workspace
    depends_on:
      - hindsight

  # ============================================
  # Hindsight - 向量记忆服务
  # Hindsight 本身也需要调用 LLM 做 embedding，
  # 这里复用你的 SiliconFlow API Key。
  # ============================================
  hindsight:
    image: ghcr.nju.edu.cn/vectorize-io/hindsight:latest
    container_name: myclaw-hindsight
    restart: always
    ports:
      - "8888:8888"
    environment:
      - TZ=Asia/Shanghai
      - HINDSIGHT_DATA_DIR=/data
      # Hindsight 内部使用的 LLM（用于 embedding）
      - HINDSIGHT_API_LLM_API_KEY=${SILICONFLOW_API_KEY:-}
      - HINDSIGHT_API_LLM_BASE_URL=https://api.siliconflow.cn/v1
      - HINDSIGHT_API_LLM_MODEL=${SILICONFLOW_MODEL:-deepseek-ai/DeepSeek-V4-Flash}
      # HuggingFace 镜像（国内加速）
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - hindsight_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  paicli_data:
  hindsight_data:
